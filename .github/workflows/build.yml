name: Build Matrixx - CMF Phone 1

on:
  workflow_dispatch:
    inputs:
      BUILD_TYPE:
        description: 'Build Type'
        required: true
        default: 'user'
        type: choice
        options:
          - user
          - userdebug

jobs:
  build:
    name: Build Matrixx ROM
    runs-on: self-hosted
    timeout-minutes: 720

    steps:

      - name: System Info
        run: |
          echo "CPU: $(nproc) cores"
          echo "RAM: $(free -h | grep Mem)"
          df -h

      - name: Install Dependencies
        run: |
          sudo apt update -y
          sudo apt install -y \
            git-core gnupg flex bison \
            build-essential zip curl \
            zlib1g-dev gcc-multilib \
            g++-multilib libc6-dev-i386 \
            lib32ncurses5-dev \
            x11proto-core-dev \
            libx11-dev lib32z1-dev \
            libgl1-mesa-dev libxml2-utils \
            xsltproc unzip fontconfig \
            python3 python-is-python3 \
            libssl-dev bc wget libelf-dev \
            ccache lzop rsync \
            openjdk-17-jdk

      - name: Configure Git
        run: |
          git config --global user.email \
            "build@github.com"
          git config --global user.name \
            "GitHub Actions"

      - name: Setup Repo Tool
        run: |
          mkdir -p ~/bin
          curl -L \
            https://storage.googleapis.com/git-repo-downloads/repo \
            > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Setup CCache
        run: |
          ccache -M 80G
          export USE_CCACHE=1
          export CCACHE_EXEC=/usr/bin/ccache

      - name: Initialize Matrixx Source
        run: |
          mkdir -p ~/android/matrixx
          cd ~/android/matrixx
          repo init \
            -u https://github.com/ProjectMatrixx/android.git \
            -b 16.2 \
            --git-lfs

      - name: Setup Local Manifest
        run: |
          mkdir -p \
            ~/android/matrixx/.repo/local_manifests

          cat > ~/android/matrixx/.repo/local_manifests/roomservice.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>

            <!-- CMF Phone 1 Device Tree -->
            <project
              name="SuperAviation001/android_device_nothing_Tetris"
              path="device/nothing/tetris"
              remote="github"
              revision="pixelos-a16" />

          </manifest>
          EOF

      - name: Sync Sources
        run: |
          cd ~/android/matrixx
          repo sync -c \
            -j$(nproc --all) \
            --force-sync \
            --no-clone-bundle \
            --no-tags

      - name: Clone Kernel Tree
        run: |
          git clone --depth=1 \
            https://github.com/SuperAviation001/android_device_nothing_Tetris-kernel.git \
            ~/android/matrixx/device/nothing/tetris-kernel

      - name: Clone Vendor Tree
        run: |
          git clone --depth=1 \
            https://gitlab.com/SuperAviation001/android_vendor_nothing_tetris.git \
            ~/android/matrixx/vendor/nothing

      - name: Clone Hardware MediaTek
        run: |
          git clone --depth=1 \
            https://github.com/SuperAviation001/android_hardware_mediatek.git \
            ~/android/matrixx/hardware/mediatek

      - name: Check Disk Space
        run: df -h

      - name: Build Matrixx
        run: |
          cd ~/android/matrixx
          source build/envsetup.sh
          lunch matrixx_tetris-bp4a-${{ github.event.inputs.BUILD_TYPE }}
          export ALLOW_MISSING_DEPENDENCIES=true
          make matrixx -j$(nproc)

      - name: ROM Details
        if: success()
        run: |
          ls ~/android/matrixx/out/target/product/tetris/*.zip
          du -sh \
            ~/android/matrixx/out/target/product/tetris/*.zip

      - name: Upload ROM
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: matrixx-tetris-${{ github.run_number }}
          name: "Matrixx v16.2 CMF Phone 1 Build #${{ github.run_number }}"
          body: |
            ## Matrixx v16.2 - CMF Phone 1
            **Type:** ${{ github.event.inputs.BUILD_TYPE }}
            ### Trees:
            - Device: SuperAviation001/android_device_nothing_Tetris
            - Kernel: SuperAviation001/android_device_nothing_Tetris-kernel
            - Vendor: SuperAviation001/android_vendor_nothing_tetris
            - Hardware: SuperAviation001/android_hardware_mediatek
          files: |
            ~/android/matrixx/out/target/product/tetris/*.zip
            ~/android/matrixx/out/target/product/tetris/boot.img
            ~/android/matrixx/out/target/product/tetris/recovery.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
