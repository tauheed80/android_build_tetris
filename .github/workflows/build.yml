name: Build Matrixx - CMF Phone 1

on:
  workflow_dispatch:
    inputs:
      BUILD_TYPE:
        description: 'Build Type'
        required: true
        default: 'userdebug'
        type: choice
        options:
          - user
          - userdebug

jobs:
  build:
    name: Build Matrixx ROM
    runs-on: self-hosted
    timeout-minutes: 720

    steps:
      - name: System Info
        run: |
          echo "CPU: $(nproc) cores"
          echo "RAM: $(free -h | grep Mem)"
          df -h

      - name: Install Dependencies
        run: |
          sudo apt update -y
          sudo apt install -y \
            git-core gnupg flex bison build-essential zip curl zlib1g-dev \
            gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev \
            x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev \
            libxml2-utils xsltproc unzip fontconfig python3 python-is-python3 \
            libssl-dev bc wget libelf-dev ccache lzop rsync openjdk-17-jdk

      - name: Configure Git
        run: |
          git config --global user.email "build@github.com"
          git config --global user.name "GitHub Actions"

      - name: Setup Repo Tool
        run: |
          mkdir -p ~/bin
          curl -L https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Setup CCache
        run: |
          ccache -M 80G
          export USE_CCACHE=1
          export CCACHE_EXEC=/usr/bin/ccache

      - name: Initialize Matrixx Source
        run: |
          repo init -u https://github.com/ProjectMatrixx/android.git -b 16.2 --git-lfs

      - name: Setup Local Manifest
        run: |
          mkdir -p .repo/local_manifests
          cat > .repo/local_manifests/roomservice.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <project name="SuperAviation001/android_device_nothing_Tetris" path="device/nothing/Tetris" remote="github" revision="pixelos-a16" />
          </manifest>
          EOF

      - name: Sync Sources
        run: |
          git config --global http.postBuffer 1048576000
          repo sync -c -j4 --fail-fast --force-sync --no-clone-bundle --no-tags

      - name: Clone Kernel Tree
        run: |
          rm -rf kernel/nothing/Tetris
          git clone --depth=1 https://github.com/SuperAviation001/android_device_nothing_Tetris-kernel.git kernel/nothing/Tetris

      - name: Clone Vendor Tree
        run: |
          rm -rf vendor/nothing/Tetris
          git clone --depth=1 https://gitlab.com/SuperAviation001/android_vendor_nothing_tetris.git vendor/nothing/Tetris

      - name: Clone Hardware MediaTek
        run: |
          rm -rf hardware/mediatek
          git clone --depth=1 https://github.com/SuperAviation001/android_hardware_mediatek.git hardware/mediatek

      - name: Fix Device Tree for Matrixx (Capital Tetris Fix)
        run: |
          # Device folder mein jayenge (Ab Capital T use hoga)
          cd device/nothing/Tetris || true
          
          # Main files ko matrixx_Tetris.mk mein badalna
          mv lineage_tetris.mk matrixx_Tetris.mk 2>/dev/null || true
          mv aosp_tetris.mk matrixx_Tetris.mk 2>/dev/null || true
          mv pixelos_tetris.mk matrixx_Tetris.mk 2>/dev/null || true
          mv lineage_Tetris.mk matrixx_Tetris.mk 2>/dev/null || true
          mv aosp_Tetris.mk matrixx_Tetris.mk 2>/dev/null || true
          mv pixelos_Tetris.mk matrixx_Tetris.mk 2>/dev/null || true
          
          # Har jagah pixelos/lineage aur small tetris ko matrixx_Tetris se badalna
          find . -type f -exec sed -i "s/pixelos_Tetris/matrixx_Tetris/g" {} + 2>/dev/null || true
          find . -type f -exec sed -i "s/lineage_Tetris/matrixx_Tetris/g" {} + 2>/dev/null || true
          find . -type f -exec sed -i "s/pixelos_tetris/matrixx_Tetris/g" {} + 2>/dev/null || true
          find . -type f -exec sed -i "s/lineage_tetris/matrixx_Tetris/g" {} + 2>/dev/null || true
          
          # Paths ko theek karna taaki device.mk mil sake
          find . -type f -exec sed -i "s/nothing\/tetris/nothing\/Tetris/g" {} + 2>/dev/null || true
          
          # Vendor path ko matrixx vendor pe set karna
          find . -type f -exec sed -i "s/vendor\/pixelos/vendor\/matrixx/g" {} + 2>/dev/null || true
          find . -type f -exec sed -i "s/vendor\/lineage/vendor\/matrixx/g" {} + 2>/dev/null || true
          
          # Naya AndroidProducts.mk forceful setup (Capital T ke sath)
          cat <<EOF > AndroidProducts.mk
          PRODUCT_MAKEFILES := \$(LOCAL_DIR)/matrixx_Tetris.mk
          COMMON_LUNCH_CHOICES := matrixx_Tetris-bp4a-user matrixx_Tetris-bp4a-userdebug
          EOF
          
          echo "Done! Case-sensitivity issue permanently fixed using Capital Tetris."
          cd ../../../

      - name: Check Disk Space
        run: df -h

      - name: Build Matrixx
        run: |
          source build/envsetup.sh
          
          # Matrixx 16.2 ka official lunch format (Capital Tetris ke sath)
          lunch matrixx_Tetris-bp4a-${{ github.event.inputs.BUILD_TYPE }}
          
          export ALLOW_MISSING_DEPENDENCIES=true
          
          # Matrixx ka official build command
          make matrixx -j$(nproc --all)

      - name: ROM Details
        if: success()
        run: |
          ls out/target/product/Tetris/*.zip || true
          du -sh out/target/product/Tetris/*.zip || true

      - name: Upload ROM
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: matrixx-Tetris-${{ github.run_number }}
          name: "Matrixx v16.2 CMF Phone 1 Build #${{ github.run_number }}"
          body: |
            ## Matrixx v16.2 - CMF Phone 1 (Tetris)
            **Type:** ${{ github.event.inputs.BUILD_TYPE }}
          files: |
            out/target/product/Tetris/*.zip
            out/target/product/Tetris/boot.img
            out/target/product/Tetris/vendor_boot.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
