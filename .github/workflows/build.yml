name: Build Matrixx - CMF Phone 1

on:
  workflow_dispatch:
    inputs:
      BUILD_TYPE:
        description: "Build Type"
        required: true
        default: "userdebug"
        type: choice
        options:
          - userdebug
          - user

jobs:
  build:
    name: Build Matrixx ROM
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:

      - name: Free Disk Space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache \
            /usr/local/share/boost \
            /usr/share/swift \
            /usr/local/graalvm/ \
            /usr/local/.ghcup/ \
            /usr/local/lib/node_modules/ \
            /usr/share/julia
          sudo apt clean
          sudo docker system prune -af || true
          df -h

      - name: Install Packages
        run: |
          sudo apt update -y
          sudo apt install -y \
            git-core gnupg flex bison \
            build-essential zip curl \
            zlib1g-dev gcc-multilib \
            g++-multilib libc6-dev-i386 \
            lib32ncurses5-dev x11proto-core-dev \
            libx11-dev lib32z1-dev \
            libgl1-mesa-dev libxml2-utils \
            xsltproc unzip fontconfig \
            python3 python-is-python3 \
            libssl-dev bc wget libelf-dev \
            ccache lzop rsync openjdk-17-jdk

      - name: Configure Git
        run: |
          git config --global user.email \
            "build@github.com"
          git config --global user.name \
            "GitHub Actions"

      - name: Setup Repo Tool
        run: |
          mkdir -p ~/bin
          curl -L \
            https://storage.googleapis.com/git-repo-downloads/repo \
            > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Initialize Matrixx Source
        run: |
          mkdir -p ~/android/matrixx
          cd ~/android/matrixx
          repo init \
            -u https://github.com/ProjectMatrixx/android.git \
            -b 16.2 \
            --git-lfs \
            --depth=1

      - name: Setup Local Manifest
        run: |
          mkdir -p \
            ~/android/matrixx/.repo/local_manifests
          cat > ~/android/matrixx/.repo/local_manifests/roomservice.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>

            <project
              name="SuperAviation001/android_device_nothing_Tetris"
              path="device/nothing/tetris"
              remote="github"
              revision="pixelos-a16" />

            <project
              name="SuperAviation001/android_device_nothing_Tetris-kernel"
              path="device/nothing/tetris-kernel"
              remote="github"
              revision="pixelos-a16" />

            <project
              name="SuperAviation001/android_hardware_mediatek"
              path="hardware/mediatek"
              remote="github"
              revision="main" />

            <remove-project
              name="platform/prebuilts/clang/host/linux-x86" />

          </manifest>
          EOF

      - name: Clone Vendor Tree
        run: |
          git clone --depth=1 \
            https://gitlab.com/SuperAviation001/android_vendor_nothing_tetris.git \
            ~/android/matrixx/vendor/nothing

      - name: Clone Kernel Headers
        run: |
          git clone --depth=1 \
            https://github.com/NothingOSS/android_kernel_6.1_nothing_mt6878.git \
            ~/android/matrixx/kernel/nothing/tetris

      - name: Sync Sources
        run: |
          cd ~/android/matrixx
          repo sync \
            -c -j$(nproc) \
            --force-sync \
            --no-clone-bundle \
            --no-tags \
            --optimized-fetch \
            --prune

      - name: Check Disk Space
        run: df -h

      - name: Build Matrixx
        run: |
          cd ~/android/matrixx
          source build/envsetup.sh
          lunch matrixx_tetris-${{ github.event.inputs.BUILD_TYPE }}
          export ALLOW_MISSING_DEPENDENCIES=true
          export ART_BUILD_TARGET_DEBUG=false
          export ART_BUILD_HOST_DEBUG=false
          mka bacon -j$(nproc)

      - name: Upload ROM
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Matrixx-tetris
          path: |
            ~/android/matrixx/out/target/product/tetris/*.zip
            ~/android/matrixx/out/target/product/tetris/boot.img
            ~/android/matrixx/out/target/product/tetris/recovery.img
          retention-days: 7
