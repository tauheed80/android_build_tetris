name: Build Matrixx - CMF Phone 1

on:
  workflow_dispatch:
    inputs:
      BUILD_TYPE:
        description: 'Build Type'
        required: true
        default: 'userdebug'
        type: choice
        options:
          - user
          - userdebug

jobs:
  build:
    name: Build Matrixx ROM
    runs-on: self-hosted
    timeout-minutes: 720

    steps:
      - name: System Info
        run: |
          echo "CPU: $(nproc) cores"
          echo "RAM: $(free -h | grep Mem)"
          df -h

      - name: Install Dependencies
        run: |
          sudo apt update -y
          sudo apt install -y \
            git-core gnupg flex bison \
            build-essential zip curl \
            zlib1g-dev gcc-multilib \
            g++-multilib libc6-dev-i386 \
            lib32ncurses5-dev \
            x11proto-core-dev \
            libx11-dev lib32z1-dev \
            libgl1-mesa-dev libxml2-utils \
            xsltproc unzip fontconfig \
            python3 python-is-python3 \
            libssl-dev bc wget libelf-dev \
            ccache lzop rsync \
            openjdk-17-jdk

      - name: Configure Git
        run: |
          git config --global user.email "build@github.com"
          git config --global user.name "GitHub Actions"

      - name: Setup Repo Tool
        run: |
          mkdir -p ~/bin
          curl -L https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Setup CCache
        run: |
          ccache -M 80G
          export USE_CCACHE=1
          export CCACHE_EXEC=/usr/bin/ccache

      - name: Initialize Matrixx Source
        run: |
          # GitHub ke automatic workspace folder ka use karenge takki paths sahi rahein
          repo init -u https://github.com/ProjectMatrixx/android.git -b 16.2 --git-lfs

      - name: Setup Local Manifest
        run: |
          mkdir -p .repo/local_manifests
          cat > .repo/local_manifests/roomservice.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <project name="SuperAviation001/android_device_nothing_Tetris" path="device/nothing/tetris" remote="github" revision="pixelos-a16" />
          </manifest>
          EOF

      - name: Sync Sources
        run: |
          git config --global http.postBuffer 1048576000
          repo sync -c -j4 --fail-fast --force-sync --no-clone-bundle --no-tags

      - name: Clone Kernel Tree
        run: |
          rm -rf kernel/nothing/tetris
          git clone --depth=1 https://github.com/SuperAviation001/android_device_nothing_Tetris-kernel.git kernel/nothing/tetris

      - name: Clone Vendor Tree
        run: |
          rm -rf vendor/nothing/tetris
          git clone --depth=1 https://gitlab.com/SuperAviation001/android_vendor_nothing_tetris.git vendor/nothing/tetris

      - name: Clone Hardware MediaTek
        run: |
          rm -rf hardware/mediatek
          git clone --depth=1 https://github.com/SuperAviation001/android_hardware_mediatek.git hardware/mediatek

      - name: Fix Case-Sensitivity and Tree Names
        run: |
          # Agar tree ke andar files capital/small ya lineage name se hain toh unhe badalna
          cd device/nothing/tetris
          mv lineage_tetris.mk matrixx_tetris.mk 2>/dev/null || true
          mv aosp_tetris.mk matrixx_tetris.mk 2>/dev/null || true
          mv lineage_Tetris.mk matrixx_tetris.mk 2>/dev/null || true
          mv aosp_Tetris.mk matrixx_tetris.mk 2>/dev/null || true
          
          # Codes ke andar bache hue namo ko Matrixx ke hisab se rename karna
          sed -i 's/lineage_tetris/matrixx_tetris/g' * 2>/dev/null || true
          sed -i 's/aosp_tetris/matrixx_tetris/g' * 2>/dev/null || true
          sed -i 's/lineage_Tetris/matrixx_tetris/g' * 2>/dev/null || true
          sed -i 's/Tetris/tetris/g' * 2>/dev/null || true
          sed -i 's/lineage/matrixx/g' matrixx_tetris.mk 2>/dev/null || true

      - name: Check Disk Space
        run: df -h

      - name: Build Matrixx
        run: |
          source build/envsetup.sh
          
          # Sahi lunch combo match karne ke liye alag-alag variations try karega automatic
          lunch matrixx_tetris-bp4a-${{ github.event.inputs.BUILD_TYPE }} || lunch matrixx_tetris-${{ github.event.inputs.BUILD_TYPE }}
          
          export ALLOW_MISSING_DEPENDENCIES=true
          mka bacon -j$(nproc --all)

      - name: ROM Details
        if: success()
        run: |
          ls out/target/product/tetris/*.zip || ls out/target/product/Tetris/*.zip
          du -sh out/target/product/tetris/*.zip || du -sh out/target/product/Tetris/*.zip

      - name: Upload ROM
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: matrixx-tetris-${{ github.run_number }}
          name: "Matrixx v16.2 CMF Phone 1 Build #${{ github.run_number }}"
          body: |
            ## Matrixx v16.2 - CMF Phone 1 (tetris)
            **Type:** ${{ github.event.inputs.BUILD_TYPE }}
          files: |
            out/target/product/tetris/*.zip
            out/target/product/tetris/boot.img
            out/target/product/tetris/vendor_boot.img
            out/target/product/Tetris/*.zip
            out/target/product/Tetris/boot.img
            out/target/product/Tetris/vendor_boot.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
