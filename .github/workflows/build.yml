name: Build ROM

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y git-core gnupg flex bison build-essential zip curl \
        zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5-dev \
        x11proto-core-dev libx11-dev libgl1-mesa-dev libxml2-utils xsltproc unzip \
        fontconfig python3 python3-pip

    - name: Setup Git
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"

    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "PATH=~/bin:$PATH" >> $GITHUB_ENV

    - name: Initialize Repo
      run: |
        mkdir rom && cd rom

        # ⚠️ IMPORTANT: change branch here if needed
        repo init -u https://github.com/ProjectMatrixx/android_manifest.git -b 14.0

    - name: Sync Source (FIXED)
      run: |
        cd rom

        # FIX: avoids broken refs like pixelos-a16 / missing main branches
        repo sync -c --no-tags --no-clone-bundle --force-sync -j2 --fail-fast

    - name: Clone Device / Kernel / Vendor
      run: |
        cd rom

        # 🔥 DEVICE TREE (replace with yours if needed)
        git clone https://github.com/beingashwani/android_device_nothing_Tetris-kernel.git device/nothing/tetris

        # ⚠️ KERNEL (make sure branch exists!)
        git clone https://github.com/LineageOS/android_kernel_common.git kernel/nothing/tetris

    - name: Build ROM
      run: |
        cd rom

        source build/envsetup.sh
        lunch lineage_tetris-userdebug || true

        # Build command (safe parallel build)
        mka bacon -j$(nproc)

    - name: Upload Output
      uses: actions/upload-artifact@v4
      with:
        name: ROM-Output
        path: rom/out/target/product/*
      
